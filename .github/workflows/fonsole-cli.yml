
name: fonsole-cli

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
  release:
    needs: test
    uses: ./.github/workflows/release.yml
    with:
      name: fonsole-cli
      harborProject: kigawa-net
      manifestFile: ""
      repository: ""
      dockerFile: ./fonsole-cli/Dockerfile
    secrets:
      HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}